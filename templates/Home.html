{% extends "layout.html" %}
{% block body %}
  <div class= "three-column">
    {% for Player in results %}
    <a href="{{ url_for('Player', id=Player[0]) }}">
        <div class="w3-card-4">
                <h1>{{ Player[1] }} {{ Player[2] }}</h1>
                <img src="{{ Player[3] }}" alt="{{ Player[2] }}">
        </div>
    </a>
    {% endfor %}
  </div>
{% endblock %}
