<!DOCTYPE html>

<html>
<head>
    <title>PC Builder</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { border-collapse: collapse; width: 60%; margin-bottom: 30px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        a.button {
            padding: 5px 10px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        a.button:hover { background-color: #218838; }
    </style>
</head>
<body>


<div class="container">

  <div>
    <h1>PC Parts</h1>

    <div class="parts-grid">
      {% for part in parts %}
        <div class="part-card">
          <img src="{{ part.image_url }}" alt="{{ part.name }}">

          <h4>{{ part.name }}</h4>
          <p>{{ part.category }}</p>
          <p>${{ part.price }}</p>

          <a href="/add/{{ part.PartID }}" class="button">Add</a>
          </form>
        </div>
      {% endfor %}
    </div>
  </div>

  <div></div> <!-- spacer -->

  <div class="build">
    <h2>Your Build</h2>

    {% for part in build %}
      <div class="build-card">
        <img src="{{ url_for('static', filename=part.image_url) }}">
        <h4>{{ part.name }}</h4>
        <p>${{ part.price }}</p>
      </div>
    {% endfor %}
  </div>

</div>
